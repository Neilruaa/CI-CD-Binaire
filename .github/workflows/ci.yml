name: Pipeline CI Binaire

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install -r ../../requirements.txt
        pip install -e .

    - name: Tests
      run: |
        pytest -v